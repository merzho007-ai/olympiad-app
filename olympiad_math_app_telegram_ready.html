let curTheme=0, curIdx=0, filteredItems=null;

const solved = {};
function markSolved(key){
  solved[key]=(solved[key]||0)+1;
  document.getElementById('prog-fill').style.background=THEMES[curTheme].color;
  renderProgress();
}

function getItems(){return filteredItems||DATA[curTheme];}

function renderTabs(){
  const el=document.getElementById('tabs');
  el.innerHTML=THEMES.map((t,i)=>`<button class="tab${i===curTheme?' active':''}" onclick="setTheme(${i})" style="${i===curTheme?'border-color:'+t.color+';color:'+t.color:''}"><span>${t.name}</span><span class="badge" style="background:${i===curTheme?t.color+'22':'var(--color-background-secondary)'};color:${i===curTheme?t.color:'var(--color-text-secondary)'}">${DATA[i].length}</span></button>`).join('');
}

function renderProgress(){
  const items=getItems();
  const total=items.length;
  const done=items.filter((_,i)=>solved[curTheme+'_'+i]).length;
  document.getElementById('prog-text').textContent=filteredItems?`Найдено: ${total}`:`${THEMES[curTheme].name}`;
  document.getElementById('prog-count').textContent=`${curIdx+1} / ${total}`;
  document.getElementById('prog-fill').style.width=((curIdx+1)/total*100)+'%';
  document.getElementById('prog-fill').style.background=THEMES[curTheme].color;
}

function renderCard(){
  const items=getItems();
  if(!items.length){document.getElementById('card-area').innerHTML='<p style="color:var(--color-text-secondary);padding:2rem 0">Ничего не найдено</p>';return;}
  if(curIdx>=items.length)curIdx=items.length-1;
  const p=items[curIdx];
  const th=THEMES[curTheme];
  document.getElementById('card-area').innerHTML=`
    <div class="card">
      <div class="card-num" style="color:${th.color}">Задача ${p.n || curIdx+1}</div>
      <div class="card-text">${p.t}</div>
      <div>
        <button class="toggle-btn" onclick="toggleReveal('hint-${curIdx}',this)"><i class="ti ti-lightbulb" aria-hidden="true" style="font-size:14px"></i> Подсказка</button>
        <button class="toggle-btn" onclick="toggleReveal('s1-${curIdx}',this)"><i class="ti ti-route" aria-hidden="true" style="font-size:14px"></i> Способ 1</button>
        <button class="toggle-btn" onclick="toggleReveal('s2-${curIdx}',this)"><i class="ti ti-route-2" aria-hidden="true" style="font-size:14px"></i> Способ 2</button>
        <button class="toggle-btn" onclick="toggleReveal('ans-${curIdx}',this);markSolved('${curTheme}_${curIdx}')"><i class="ti ti-check" aria-hidden="true" style="font-size:14px"></i> Ответ</button>
      </div>
      <div class="reveal reveal-hint" id="hint-${curIdx}">
        <div class="reveal-label" style="color:${th.color}">Подсказка</div>
        <div class="reveal-text">${p.h}</div>
      </div>
      <div class="reveal" id="s1-${curIdx}" style="border-left-color:${th.color}">
        <div class="reveal-label" style="color:${th.color}">${p.s1||'Способ 1'}</div>
        <div class="reveal-text">${p.s1?p.s1.split('||').pop():p.t}</div>
      </div>
      <div class="reveal" id="s2-${curIdx}" style="border-left-color:${th.color}">
        <div class="reveal-label" style="color:${th.color}">${p.s2||'Способ 2'}</div>
        <div class="reveal-text">${p.s2?'':p.t}</div>
      </div>
      <div class="reveal reveal-answer" id="ans-${curIdx}">
        <div class="reveal-label" style="color:#1D9E75">Ответ</div>
        <div class="reveal-text" style="font-weight:500">${p.a}</div>
      </div>

      <div style="margin-top:8px">
        <button class="toggle-btn" onclick="toggleReveal('conc-${curIdx}',this)">
          Вывод
        </button>
      </div>

      <div class="reveal reveal-conclusion" id="conc-${curIdx}" style="background:var(--color-background-secondary);border-left-color:#7F77DD;margin-top:8px">
        <div class="reveal-label" style="color:#7865D0">Вывод</div>
        <div class="reveal-text">${p.c}</div>
      </div>
    </div>`;
  document.getElementById('btn-prev').disabled=curIdx===0;
  document.getElementById('btn-next').disabled=curIdx===items.length-1;
  document.getElementById('nav-label').textContent=`${curIdx+1} из ${items.length}`;
  renderProgress();
}

function fixReveal(el, content, label){
  el.innerHTML=`<div class="reveal-label">${label||''}</div><div class="reveal-text">${content||''}</div>`;
}

function toggleReveal(id,btn){
  const el=document.getElementById(id);
  if(!el)return;
  el.classList.toggle('show');
  btn.classList.toggle('open');
}

function setTheme(i){
  curTheme=i;curIdx=0;filteredItems=null;
  document.getElementById('search').value='';
  renderTabs();renderCard();
}

function go(d){
  const items=getItems();
  curIdx=Math.max(0,Math.min(items.length-1,curIdx+d));
  renderCard();
}

function doSearch(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  if(!q){filteredItems=null;}
  else{
    const all=[];
    Object.keys(DATA).forEach(k=>{
      DATA[k].forEach((p,i)=>{if(p.t.toLowerCase().includes(q)||p.h.toLowerCase().includes(q)||(p.a&&p.a.toLowerCase().includes(q))){all.push({...p,_theme:+k,_i:i});}});
    });
    filteredItems=all;
  }
  curIdx=0;
  renderCard();
  renderProgress();
}

// Fix s1/s2 display: they contain format "title||content"
function fixCards(){
  document.querySelectorAll('[id^="s1-"],[id^="s2-"]').forEach(el=>{
    const lbl=el.querySelector('.reveal-label');
    const txt=el.querySelector('.reveal-text');
    if(lbl&&txt){
      const items=getItems();
      const idx=parseInt(el.id.split('-').pop());
      if(idx<items.length){
        const p=items[idx];
        const isS1=el.id.startsWith('s1');
        const content=isS1?p.s1:p.s2;
        const titleKey=isS1?'s1_title':'s2_title';
        lbl.textContent=p[titleKey]||(isS1?'Способ 1':'Способ 2');
        txt.textContent=content||'';
      }
    }
  });
}

renderTabs();renderCard();
setTimeout(fixCards,100);
document.addEventListener('click',e=>{if(e.target.closest('[id^="s1-"],[id^="s2-"]'))setTimeout(fixCards,50);});
</script>
