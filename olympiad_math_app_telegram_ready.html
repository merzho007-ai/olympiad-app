
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.app { padding: 1rem 0; }
.theme-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.25rem; }
.tab { padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: transparent; cursor: pointer; font-size: 13px; color: var(--color-text-secondary); transition: all .15s; }
.tab:hover { background: var(--color-background-secondary); }
.tab.active { background: var(--color-background-primary); border-color: var(--color-border-primary); color: var(--color-text-primary); font-weight: 500; }
.progress { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1rem; display: flex; align-items: center; gap: 12px; }
.progress-bar { flex: 1; height: 4px; background: var(--color-border-tertiary); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; transition: width .3s; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
.card-num { font-size: 12px; font-weight: 500; margin-bottom: 6px; }
.card-text { font-size: 15px; line-height: 1.65; color: var(--color-text-primary); margin-bottom: 1rem; }
.toggle-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; cursor: pointer; font-size: 13px; color: var(--color-text-secondary); margin-right: 8px; margin-bottom: 8px; }
.toggle-btn:hover { background: var(--color-background-secondary); }
.toggle-btn.open { color: var(--color-text-primary); background: var(--color-background-secondary); }
.reveal { margin-top: 12px; padding: 12px 14px; border-radius: var(--border-radius-md); background: var(--color-background-secondary); border-left: 3px solid; display: none; }

.reveal-hint { border-color: #EF9F27; }
.reveal-s1 { border-color: currentColor; }
.reveal-s2 { border-color: currentColor; }
.reveal-answer { border-color: #1D9E75; }
.reveal-conclusion { border-color: #7F77DD; }
.reveal-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; color: var(--color-text-secondary); }
.reveal-text { font-size: 14px; line-height: 1.6; color: var(--color-text-primary); white-space: pre-line; }
.nav { display: flex; align-items: center; gap: 10px; margin-top: 1rem; }
.nav-btn { padding: 8px 18px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; cursor: pointer; font-size: 14px; color: var(--color-text-primary); }
.nav-btn:hover { background: var(--color-background-secondary); }
.nav-btn:disabled { opacity: .35; cursor: default; }
.nav-center { flex: 1; text-align: center; font-size: 13px; color: var(--color-text-secondary); }
.search-row { display: flex; gap: 8px; margin-bottom: 1rem; }
.search-row input { flex: 1; padding: 8px 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 14px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; margin-left: 8px; }
